<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none';
                 script-src 'nonce-{{nonce}}';
                 style-src 'unsafe-inline';" />
  <title>Token Lens</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--vscode-font-family);
      font-size: 12px;
      color: var(--vscode-foreground);
      background: transparent;
      padding: 8px 10px 24px;
    }

    /* ── TABS ── */
    .tab-bar {
      display: flex;
      gap: 2px;
      margin-bottom: 10px;
      border-bottom: 1px solid var(--vscode-panel-border, rgba(255,255,255,.12));
    }

    .tab-btn {
      flex: 1;
      padding: 6px 4px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--vscode-foreground);
      font-size: 11px;
      font-family: var(--vscode-font-family);
      font-weight: 500;
      cursor: pointer;
      opacity: .45;
      text-align: center;
      margin-bottom: -1px;
      transition: opacity .12s;
    }
    .tab-btn:hover  { opacity: .8; }
    .tab-btn.active { opacity: 1; border-bottom-color: #4ec994; color: #4ec994; }

    /* ── HERO CARD ── */
    .hero-card {
      border-radius: 6px;
      padding: 12px 14px;
      margin-bottom: 10px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
      transition: border-color .3s, background .3s;
    }
    .hero-card.eff-good { border-color: rgba(78,201,148,.35); background: rgba(78,201,148,.04); }
    .hero-card.eff-warn { border-color: rgba(229,192,123,.35); background: rgba(229,192,123,.04); }
    .hero-card.eff-bad  { border-color: rgba(224,108,117,.35); background: rgba(224,108,117,.04); }

    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .hero-status { display: flex; align-items: center; gap: 7px; }

    .status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      background: rgba(255,255,255,.25);
      transition: background .3s;
    }
    .eff-good .status-dot { background: #4ec994; box-shadow: 0 0 6px rgba(78,201,148,.5); }
    .eff-warn .status-dot { background: #e5c07b; box-shadow: 0 0 6px rgba(229,192,123,.5); }
    .eff-bad  .status-dot { background: #e06c75; box-shadow: 0 0 6px rgba(224,108,117,.5); }

    .status-label { font-size: 12px; font-weight: 600; opacity: .85; }

    .hero-eff {
      font-size: 22px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: rgba(255,255,255,.25);
      transition: color .3s;
    }
    .eff-good .hero-eff { color: #4ec994; }
    .eff-warn .hero-eff { color: #e5c07b; }
    .eff-bad  .hero-eff { color: #e06c75; }

    .hero-bar-bg {
      height: 5px;
      border-radius: 3px;
      background: rgba(255,255,255,.08);
      margin-bottom: 10px;
    }
    .hero-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: #4ec994;
      transition: width .5s ease, background .3s;
    }
    .eff-warn .hero-bar-fill { background: #e5c07b; }
    .eff-bad  .hero-bar-fill { background: #e06c75; }

    .hero-costs { display: flex; gap: 20px; }

    .hero-cost-item { display: flex; flex-direction: column; gap: 2px; }
    .hero-cost-label { font-size: 10px; opacity: .45; }
    .hero-cost-value {
      font-size: 16px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .hero-cost-value.green { color: #4ec994; }

    .session-sub {
      margin-top: 8px;
      font-size: 10px;
      opacity: .35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── SECTIONS ── */
    .section {
      border: 1px solid var(--vscode-panel-border, rgba(255,255,255,.08));
      border-radius: 5px;
      margin-bottom: 8px;
      overflow: hidden;
    }

    .section-header {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--vscode-descriptionForeground);
      background: var(--vscode-sideBarSectionHeader-background, rgba(255,255,255,.03));
      padding: 5px 10px;
      border-bottom: 1px solid var(--vscode-panel-border, rgba(255,255,255,.06));
    }

    .section-body { padding: 10px; }

    /* ── QUICK WINS ── */
    .win-item {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      padding: 7px 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .win-item:last-child { border-bottom: none; }

    .win-icon { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
    .win-body { flex: 1; min-width: 0; }

    .win-title {
      font-size: 11px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 2px;
    }

    .win-action { font-size: 10px; opacity: .55; line-height: 1.45; }

    .win-item.sev-good .win-title { color: #4ec994; }
    .win-item.sev-warn .win-title { color: #e5c07b; }
    .win-item.sev-tip  .win-title { color: #61afef; }

    .no-wins { font-size: 11px; opacity: .4; font-style: italic; }

    /* ── WHERE MONEY GOES ── */
    .breakdown-row { margin-bottom: 10px; }
    .breakdown-row:last-child { margin-bottom: 0; }

    .breakdown-label-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 10px;
      margin-bottom: 3px;
    }

    .breakdown-label { opacity: .65; }

    .breakdown-cost { font-weight: 600; font-variant-numeric: tabular-nums; }

    .breakdown-pct { opacity: .35; font-size: 9px; margin-left: 3px; }

    .breakdown-bar-bg {
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,.08);
    }

    .breakdown-bar-fill {
      height: 100%;
      border-radius: 2px;
      min-width: 2px;
      transition: width .5s ease;
    }

    .bar-output { background: #e06c75; }
    .bar-input  { background: #61afef; }
    .bar-cache  { background: #4ec994; }

    .breakdown-notable {
      margin-top: 10px;
      padding: 7px 8px;
      background: rgba(255,255,255,.03);
      border-radius: 3px;
      border: 1px solid rgba(255,255,255,.06);
    }

    .breakdown-notable-title {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .06em;
      opacity: .35;
      margin-bottom: 5px;
    }

    .breakdown-notable-item {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      opacity: .6;
      padding: 1px 0;
    }

    .no-breakdown { font-size: 11px; opacity: .4; font-style: italic; }

    /* ── ACTIVE TOOLS ── */
    .tool-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .tool-item:last-child { border-bottom: none; }

    .tool-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-agent  { background: #4ec994; }
    .dot-skill  { background: #61afef; }
    .dot-plugin { background: #56b6c2; }
    .dot-hook   { background: #c678dd; }
    .dot-other  { background: rgba(255,255,255,.3); }

    .tool-name { font-size: 11px; font-weight: 600; flex: 1; }

    .tool-type {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .05em;
      opacity: .35;
    }

    .tool-meta { font-size: 10px; opacity: .5; text-align: right; }
    .tool-saved { font-size: 10px; color: #4ec994; font-weight: 600; }

    .no-tools { font-size: 11px; opacity: .4; font-style: italic; }

    /* ── LIVE FEED ── */
    .feed-item { display: flex; flex-direction: column; gap: 4px; }

    .feed-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .feed-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    .feed-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .fdot-cache   { background: #61afef; }
    .fdot-compact { background: #e5c07b; }
    .fdot-rules   { background: #c678dd; }
    .fdot-read    { background: #e06c75; }
    .fdot-agent   { background: #4ec994; }
    .fdot-plugin  { background: #56b6c2; }
    .fdot-default { background: rgba(255,255,255,.3); }

    .feed-age { font-size: 10px; opacity: .35; }

    .feed-detail { font-size: 11px; opacity: .6; line-height: 1.45; }

    .feed-numbers {
      display: flex;
      gap: 14px;
      font-size: 10px;
      font-variant-numeric: tabular-nums;
    }

    .feed-paid  { opacity: .5; }
    .feed-saved { color: #4ec994; font-weight: 600; }

    .feed-tip {
      margin-top: 4px;
      padding: 5px 8px;
      background: rgba(229,192,123,.07);
      border-left: 2px solid #e5c07b;
      border-radius: 0 3px 3px 0;
      font-size: 10px;
      color: #e5c07b;
      line-height: 1.4;
    }

    .no-feed { font-size: 11px; opacity: .4; font-style: italic; }
  </style>
</head>
<body>

  <!-- TABS -->
  <div class="tab-bar">
    <button class="tab-btn active" id="tab-project" onclick="switchTab('project')">This Project</button>
    <button class="tab-btn"        id="tab-global"  onclick="switchTab('global')">All Sessions</button>
  </div>

  <!-- EFFICIENCY STATUS -->
  <div class="hero-card" id="hero-card">
    <div class="hero-top">
      <div class="hero-status">
        <span class="status-dot" id="status-dot"></span>
        <span class="status-label" id="status-label">Waiting for session…</span>
      </div>
      <span class="hero-eff" id="hero-eff">–</span>
    </div>
    <div class="hero-bar-bg">
      <div class="hero-bar-fill" id="hero-bar-fill" style="width:0%"></div>
    </div>
    <div class="hero-costs">
      <div class="hero-cost-item">
        <span class="hero-cost-label">Spent this session</span>
        <span class="hero-cost-value" id="paid-cost">$0.000</span>
      </div>
      <div class="hero-cost-item">
        <span class="hero-cost-label">Saved by optimizations</span>
        <span class="hero-cost-value green" id="saved-cost">$0.000</span>
      </div>
    </div>
    <div class="session-sub" id="session-file">Watching ~/.claude/projects/ for activity…</div>
  </div>

  <!-- QUICK WINS -->
  <div class="section">
    <div class="section-header">Quick Wins</div>
    <div class="section-body" id="quickwins-body">
      <div class="no-wins">Collecting data…</div>
    </div>
  </div>

  <!-- WHERE MONEY GOES -->
  <div class="section">
    <div class="section-header">Where Money Goes</div>
    <div class="section-body" id="breakdown-body">
      <div class="no-breakdown">Collecting data…</div>
    </div>
  </div>

  <!-- ACTIVE TOOLS -->
  <div class="section">
    <div class="section-header">Active Tools</div>
    <div class="section-body" id="features-body">
      <div class="no-tools">No tools used yet this session</div>
    </div>
  </div>

  <!-- LIVE FEED -->
  <div class="section">
    <div class="section-header">Live Feed</div>
    <div class="section-body" id="last-event-body">
      <div class="no-feed">Waiting for activity…</div>
    </div>
  </div>

  <script nonce="{{nonce}}" src="{{scriptUri}}"></script>
</body>
</html>
